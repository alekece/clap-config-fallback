name = "titi"
debug = true
profile = "dev"
threads = 32
names = ["a", "b", "c"]

[command]
ref = "debug"
verbose = true

[server]
url = "http://localhost:8080"

[server.tls]
enabled = true
cert_path = "./certs/dev.pem"

[database]
url = "postgres://postgres:postgres@localhost:5432/toml"

[database.pool]
max_connections = 16
timeout = "10s"
